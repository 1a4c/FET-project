<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAAFET 類比設計與訊號完整性模擬器</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-red: #f87171;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--accent-blue);
            text-align: center;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #334155;
            border: none;
            color: var(--text-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: var(--accent-blue);
            color: #000;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 280px;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        canvas {
            background: #090d16;
            border-radius: 8px;
            width: 100%;
            height: 360px;
            border: 1px solid #334155;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #0f172a;
            padding: 16px;
            border-radius: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        input[type="range"] {
            width: 100%;
        }

        .metrics {
            margin-top: 12px;
            padding: 10px;
            background: #1e293b;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .metric-value {
            color: var(--accent-green);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GAAFET & RF IC 類比設計模擬系統</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('layout')">1. Layout (Log 45°)</button>
        <button class="tab-btn" onclick="switchTab('power')">2. Brownian DVFS</button>
        <button class="tab-btn" onclick="switchTab('sig')">3. AM-PM Shift</button>
    </div>

    <div class="workspace">
        <canvas id="simCanvas" width="550" height="360"></canvas>
        
        <div class="controls">
            <!-- TAB 1: Layout Controls -->
            <div id="layout-controls">
                <div class="control-group">
                    <label>佈局架構 (Routing Geometry)</label>
                    <select id="layoutType" onchange="draw()">
                        <option value="90">正交佈局 (90° Standard)</option>
                        <option value="45" selected>對角線佈局 (Log 45° GAAFET)</option>
                    </select>
                </div>
                <div class="control-group" style="margin-top: 15px;">
                    <label>金屬線間距 (Wire Pitch: nm)</label>
                    <input type="range" id="wirePitch" min="12" max="45" value="18" oninput="draw()">
                </div>
                <div class="metrics">
                    寄生電容 (Parasitic $C_p$): <br>
                    <span id="cpValue" class="metric-value">0.12 fF</span>
                </div>
            </div>

            <!-- TAB 2: Power Controls -->
            <div id="power-controls" style="display:none;">
                <div class="control-group">
                    <label>預測時間視窗 (Time Window: ms)</label>
                    <input type="range" id="timeWindow" min="5" max="50" value="20" oninput="draw()">
                </div>
                <div class="control-group">
                    <label>負載強度 (Workload Stress)</label>
                    <input type="range" id="workload" min="10" max="100" value="75" oninput="draw()">
                </div>
                <div class="metrics">
                    預防降溫觸發：<span id="dvfsStatus" class="metric-value">ACTIVE</span><br>
                    節省功耗：<span id="powerSaved" class="metric-value">28.4%</span>
                </div>
            </div>

            <!-- TAB 3: Signal Integrity Controls -->
            <div id="sig-controls" style="display:none;">
                <div class="control-group">
                    <label>PA 驅動功率 (Drive Power: dBm)</label>
                    <input type="range" id="paPower" min="0" max="18" value="12" step="0.5" oninput="draw()">
                </div>
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="selfCorrection" checked onchange="draw()"> 啟動 FET 相位自我修正
                    </label>
                </div>
                <div class="metrics">
                    AM-PM 相位偏移：<span id="phaseShift" class="metric-value">2.1°</span><br>
                    EVM 向量誤差率：<span id="evmValue" class="metric-value">1.2%</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let currentTab = 'layout';
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('layout-controls').style.display = tab === 'layout' ? 'block' : 'none';
        document.getElementById('power-controls').style.display = tab === 'power' ? 'block' : 'none';
        document.getElementById('sig-controls').style.display = tab === 'sig' ? 'block' : 'none';

        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentTab === 'layout') drawLayout();
        else if (currentTab === 'power') drawPower();
        else if (currentTab === 'sig') drawSignal();
    }

    // 1. Layout Simulation
    function drawLayout() {
        const type = document.getElementById('layoutType').value;
        const pitch = parseInt(document.getElementById('wirePitch').value);
        
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 20) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        ctx.lineWidth = 12;
        ctx.lineCap = 'round';

        if (type === '90') {
            // Straight 90 deg traces
            ctx.strokeStyle = '#38bdf8';
            ctx.beginPath(); ctx.moveTo(100, 100); ctx.lineTo(450, 100); ctx.stroke();
            ctx.strokeStyle = '#f87171';
            ctx.beginPath(); ctx.moveTo(100, 100 + pitch * 3); ctx.lineTo(450, 100 + pitch * 3); ctx.stroke();

            // Capacitance field lines
            ctx.strokeStyle = 'rgba(250, 204, 21, 0.4)';
            ctx.lineWidth = 2;
            for (let x = 120; x < 440; x += 25) {
                ctx.beginPath();
                ctx.moveTo(x, 106);
                ctx.lineTo(x, 94 + pitch * 3);
                ctx.stroke();
            }
        } else {
            // Log 45 degree trace layout
            ctx.strokeStyle = '#38bdf8';
            ctx.beginPath(); ctx.moveTo(80, 80); ctx.lineTo(250, 80); ctx.lineTo(380, 210); ctx.stroke();
            ctx.strokeStyle = '#f87171';
            ctx.beginPath(); ctx.moveTo(80, 80 + pitch * 3); ctx.lineTo(230, 80 + pitch * 3); ctx.lineTo(360, 210 + pitch * 3); ctx.stroke();

            // Direct fringe field reduction
            ctx.strokeStyle = 'rgba(74, 222, 128, 0.4)';
            ctx.lineWidth = 2;
            for (let x = 100; x < 220; x += 30) {
                ctx.beginPath();
                ctx.moveTo(x, 86);
                ctx.lineTo(x, 74 + pitch * 3);
                ctx.stroke();
            }
        }

        // Calculate Capacitance (Approximation for demo)
        const factor = type === '45' ? 0.62 : 1.0;
        const cp = ((35 / pitch) * factor).toFixed(3);
        document.getElementById('cpValue').innerText = `${cp} fF`;
    }

    // 2. Power Brownian DVFS Simulation
    function drawPower() {
        const windowSize = parseInt(document.getElementById('timeWindow').value);
        const workload = parseInt(document.getElementById('workload').value);

        ctx.fillStyle = '#0f172a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Threshold Line
        ctx.strokeStyle = '#f87171';
        ctx.setLineDash([5, 5]);
        ctx.beginPath(); ctx.moveTo(50, 80); ctx.lineTo(500, 80); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = '#f87171';
        ctx.fillText("Thermal Throttling Threshold (85°C)", 55, 75);

        // Plot Thermal/Power Curve
        ctx.beginPath();
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 3;

        let dvfsSaved = 0;
        for (let x = 0; x < 450; x += 5) {
            let noise = (Math.sin(x * 0.05) + Math.cos(x * 0.12)) * 15;
            let thermalPeak = 200 + noise - (workload * 1.2);
            
            // Predictive Brownian throttling effect
            if (x > 200 && x < 200 + windowSize * 5) {
                thermalPeak += (windowSize * 0.8); // Pre-emptive voltage drop
                dvfsSaved += 0.5;
            }

            if (x === 0) ctx.moveTo(50 + x, thermalPeak);
            else ctx.lineTo(50 + x, thermalPeak);
        }
        ctx.stroke();

        document.getElementById('powerSaved').innerText = `${(20 + windowSize * 0.4).toFixed(1)}%`;
        document.getElementById('dvfsStatus').innerText = windowSize > 15 ? "PREVENTED" : "RISK DETECTED";
        document.getElementById('dvfsStatus').style.color = windowSize > 15 ? "#4ade80" : "#f87171";
    }

    // 3. AM-PM Phase Shift Simulation
    function drawSignal() {
        const pIn = parseFloat(document.getElementById('paPower').value);
        const corrected = document.getElementById('selfCorrection').checked;

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        // Draw Grid / Axis
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(centerX, 20); ctx.lineTo(centerX, 340); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(20, centerY); ctx.lineTo(530, centerY); ctx.stroke();

        // AM-PM Phase Shift Angle calculation
        let shiftDeg = Math.max(0, (pIn - 8) * 2.5); 
        if (corrected) shiftDeg *= 0.15; // Self-correction reduces shift

        const shiftRad = (shiftDeg * Math.PI) / 180;

        // Draw 16-QAM Constellation
        const gridPoints = [-3, -1, 1, 3];
        const scale = 35;

        gridPoints.forEach(I => {
            gridPoints.forEach(Q => {
                const r = Math.sqrt(I*I + Q*Q) * scale;
                const originalAngle = Math.atan2(Q, I);
                
                // Non-linear AM-PM shift: Higher power (r) suffers larger phase rotation
                const finalAngle = originalAngle + shiftRad * (r / 100);

                const fitX = centerX + r * Math.cos(finalAngle);
                const fitY = centerY + r * Math.sin(finalAngle);

                ctx.fillStyle = corrected ? '#4ade80' : '#f87171';
                ctx.beginPath();
                ctx.arc(fitX, fitY, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        });

        document.getElementById('phaseShift').innerText = `${shiftDeg.toFixed(1)}°`;
        document.getElementById('evmValue').innerText = `${(shiftDeg * 0.45 + 0.5).toFixed(2)}%`;
    }

    // Initial render
    draw();
</script>
</body>
</html>
